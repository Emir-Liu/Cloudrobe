# SOP引擎告警规则

groups:
  - name: sop_application_alerts
    rules:
      # API错误率过高
      - alert: SOPHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: sop-engine
        annotations:
          summary: "SOP引擎错误率过高"
          description: "过去5分钟错误率为 {{ $value }}, 超过5%阈值"

      # API响应时间过长
      - alert: SOPHighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{service="sop-engine"}[5m])
          ) > 3
        for: 5m
        labels:
          severity: warning
          service: sop-engine
        annotations:
          summary: "SOP引擎响应时间过长"
          description: "P95响应时间为 {{ $value }}秒, 超过3秒阈值"

      # 数据库连接池耗尽
      - alert: DatabaseConnectionPoolExhausted
        expr: db_pool_active_connections / db_pool_max_connections > 0.9
        for: 5m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "数据库连接池接近耗尽"
          description: "活跃连接占比 {{ $value | humanizePercentage }}"

      # Redis连接失败
      - alert: RedisConnectionFailed
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis连接失败"
          description: "Redis服务无法访问"

      # MinIO存储空间不足
      - alert: MinIODiskSpaceLow
        expr: |
          (minio_disk_available_bytes / minio_disk_total_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
          service: minio
        annotations:
          summary: "MinIO存储空间不足"
          description: "可用空间占比 {{ $value | humanizePercentage }}, 低于10%"

  - name: sop_task_alerts
    rules:
      # 任务积压
      - alert: SOPTaskBacklog
        expr: redis_list_length{key="sop_task_queue"} > 1000
        for: 5m
        labels:
          severity: warning
          service: sop-engine
        annotations:
          summary: "SOP任务队列积压"
          description: "任务队列积压 {{ $value }} 个任务"

      # 任务处理失败率过高
      - alert: SOPTaskFailureRateHigh
        expr: |
          rate(sop_tasks_failed_total[5m]) / rate(sop_tasks_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: sop-engine
        annotations:
          summary: "SOP任务失败率过高"
          description: "任务失败率 {{ $value | humanizePercentage }}, 超过10%"

      # LLM调用失败
      - alert: LLMCallFailure
        expr: rate(llm_requests_failed_total[5m]) > 5
        for: 3m
        labels:
          severity: warning
          service: llm
        annotations:
          summary: "LLM调用失败频繁"
          description: "LLM调用失败率 {{ $value }}次/5分钟"

  - name: sop_system_alerts
    rules:
      # CPU使用率过高
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU使用率过高"
          description: "CPU使用率为 {{ $value }}%"

      # 内存使用率过高
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / node_memory_MemTotal_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "内存使用率为 {{ $value | humanizePercentage }}"

      # 磁盘空间不足
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘空间不足"
          description: "可用空间占比 {{ $value | humanizePercentage }}, 低于15%"
