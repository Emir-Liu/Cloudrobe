# Prometheus配置 - SOP引擎监控

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sop-engine'
    environment: 'production'

# 告警规则文件
rule_files:
  - "alerts/*.yml"

# 告警管理器
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 抓取配置
scrape_configs:
  # FastAPI应用监控
  - job_name: 'sop-app'
    static_configs:
      - targets: ['app:8000']
        labels:
          service: 'sop-engine'
          type: 'api'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # MySQL监控
  - job_name: 'mysql'
    static_configs:
      - targets: ['db:3306']
        labels:
          service: 'database'
          type: 'mysql'
    # 需要安装mysql_exporter
    # static_configs:
    #   - targets: ['mysql-exporter:9104']

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'cache'
          type: 'redis'
    # 需要安装redis_exporter
    # static_configs:
    #   - targets: ['redis-exporter:9121']

  # MinIO监控
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'storage'
          type: 'minio'

  # Nginx监控
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
        labels:
          service: 'proxy'
          type: 'nginx'

  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
